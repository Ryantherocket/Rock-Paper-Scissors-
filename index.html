<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rock Paper Scissors</title>
        <script src="index.js" defer></script>
    </head>
    <body>
       <div class="selections">
            <button id="rock" class="selection">Rock</button>
            <button id="paper" class="selection">Paper</button>
            <button id="scissors" class="selection">Scissors</button>
         </div>
         <div class="results">
            <p id="player-choice">Player Choice: </p>
            <p id="computer-choice">Computer Choice: </p>
            <p id="round-result">Round Result: </p>
            <p id="score">Score - Player: 0 Computer: 0</p>
        </body>
</html>
